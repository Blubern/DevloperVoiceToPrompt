name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            os: windows
            arch: x64
            bundle-dir: target/release/bundle
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            os: macos
            arch: arm64
            bundle-dir: target/aarch64-apple-darwin/release/bundle

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos' && 'aarch64-apple-darwin' || '' }}

      - name: Install LLVM (Windows)
        if: matrix.os == 'windows'
        run: choco install llvm -y

      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.os == 'windows'
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Install LLVM (macOS)
        if: matrix.os == 'macos'
        run: brew install llvm

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.os == 'macos'
        run: echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      - name: Set macOS build environment
        if: matrix.os == 'macos'
        run: |
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I$(xcrun --show-sdk-path)/usr/include" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        env:
          CFLAGS: ${{ matrix.os == 'macos' && '-march=armv8.5-a' || '' }}
          CXXFLAGS: ${{ matrix.os == 'macos' && '-march=armv8.5-a' || '' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.os == 'macos' && '10.15' || '' }}
        run: npx tauri build ${{ matrix.args }}

      - name: Collect and rename artifacts
        shell: bash
        env:
          BUNDLE_DIR: src-tauri/${{ matrix.bundle-dir }}
          APP_VERSION: ${{ github.ref_name }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p renamed

          VERSION="${APP_VERSION#v}"
          PREFIX="developer-voice-to-prompt-${VERSION}-${OS}-${ARCH}"

          echo "== Bundle directory contents =="
          find "$BUNDLE_DIR" -type f 2>/dev/null || echo "(empty or missing)"
          echo "==============================="

          collect() {
            local src="$1" dst="$2"
            if [ -f "$src" ]; then
              echo "  $src -> renamed/$dst"
              cp "$src" "renamed/$dst"
            fi
          }

          if [ "$OS" = "windows" ]; then
            # NSIS installer
            for f in "$BUNDLE_DIR"/nsis/*-setup.exe; do
              collect "$f" "${PREFIX}.exe"
            done
            # NSIS update zip
            for f in "$BUNDLE_DIR"/nsis/*-setup.nsis.zip; do
              collect "$f" "${PREFIX}.nsis.zip"
            done
            for f in "$BUNDLE_DIR"/nsis/*-setup.nsis.zip.sig; do
              collect "$f" "${PREFIX}.nsis.zip.sig"
            done
            # MSI installer
            for f in "$BUNDLE_DIR"/msi/*_en-US.msi; do
              collect "$f" "${PREFIX}-en-us.msi"
            done
            for f in "$BUNDLE_DIR"/msi/*_en-US.msi.zip; do
              collect "$f" "${PREFIX}.msi.zip"
            done
            for f in "$BUNDLE_DIR"/msi/*_en-US.msi.zip.sig; do
              collect "$f" "${PREFIX}.msi.zip.sig"
            done
          elif [ "$OS" = "macos" ]; then
            # DMG
            for f in "$BUNDLE_DIR"/dmg/*.dmg; do
              collect "$f" "${PREFIX}.dmg"
            done
            # App tar.gz (for updater)
            for f in "$BUNDLE_DIR"/macos/*.app.tar.gz; do
              collect "$f" "${PREFIX}.tar.gz"
            done
            for f in "$BUNDLE_DIR"/macos/*.app.tar.gz.sig; do
              collect "$f" "${PREFIX}.tar.gz.sig"
            done
          fi

          echo "Renamed artifacts:"
          ls -la renamed/

          # Fail if nothing was collected
          if [ -z "$(ls -A renamed/)" ]; then
            echo "::error::No artifacts found in $BUNDLE_DIR"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: renamed/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: List release files
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Developer Voice to Prompt ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: artifacts/*
