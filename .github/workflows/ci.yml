name: CI

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install llvm -y

      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.platform == 'windows-latest'
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Install LLVM (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install llvm

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.platform == 'macos-latest'
        run: echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      - name: Set macOS build environment
        if: matrix.platform == 'macos-latest'
        run: |
          echo "CFLAGS=-march=armv8.5-a+crypto" >> $GITHUB_ENV
          echo "CXXFLAGS=-march=armv8.5-a+crypto" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS=--sysroot=$(xcrun --show-sdk-path)" >> $GITHUB_ENV
          echo "WHISPER_DONT_GENERATE_BINDINGS=1" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Check frontend types
        run: npm run check

      - name: Run frontend tests
        run: npx vitest run

      - name: Build frontend
        run: npm run build

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test
